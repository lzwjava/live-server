version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      - CI_ENV=production
      - DB_HOST=database
      - DB_NAME=live_server
      - DB_USER=root
      - DB_PASS=changeme
    depends_on:
      - database
    networks:
      - live-net

  database:
    image: mysql:5.7
    environment:
      - MYSQL_ROOT_PASSWORD=changeme
      - MYSQL_DATABASE=live_server
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    networks:
      - live-net

  redis:
    image: redis:7-alpine
    networks:
      - live-net

networks:
  live-net:

volumes:
  mysql_data: