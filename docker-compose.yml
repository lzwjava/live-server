services:
  # --- Frontend build stage ---
  # Run with: docker compose --profile frontend up frontend
  frontend:
    profiles: ["frontend"]
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../live-mobile-web:/app
      - frontend-dist:/app/static
    environment:
      - VITE_BASE_URL=/static/
    command: sh -c "npm ci --prefer-offline && npm run build"
    networks: []

  # --- Backend ---
  app:
    build: .
    image: live-server
    ports:
      - "8082:80"
    environment:
      - CI_ENV=production
      - DB_HOST=database
      - DB_NAME=qulive
      - DB_USER=root
      - DB_PASS=WeImg4096
      - REDIS_HOST=redis
    volumes:
      - ./:/var/www/html
    depends_on:
      - database
      - redis
    networks:
      - live-net

  web:
    image: nginx:alpine
    ports:
      - "8088:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/var/www/html/public/static:ro
    depends_on:
      - app
    networks:
      - live-net

  database:
    image: mysql:5.7
    environment:
      - MYSQL_ROOT_PASSWORD=WeImg4096
      - MYSQL_DATABASE=qulive
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    networks:
      - live-net

  redis:
    image: redis:7-alpine
    networks:
      - live-net

networks:
  live-net:

volumes:
  mysql_data:
  frontend-dist:
