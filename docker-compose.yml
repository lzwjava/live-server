services:
  app:
    build: .
    image: live-server
    ports:
      - "8081:80"
    environment:
      - CI_ENV=production
      - DB_HOST=database
      - DB_NAME=live_server
      - DB_USER=root
      - DB_PASS=changeme
      - REDIS_HOST=redis
    volumes:
      - ./:/var/www/html
    depends_on:
      - database
      - redis
    networks:
      - live-net

  web:
    image: nginx:alpine
    ports:
      - "8088:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - live-net

  database:
    image: mysql:5.7
    environment:
      - MYSQL_ROOT_PASSWORD=changeme
      - MYSQL_DATABASE=live_server
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    networks:
      - live-net

  redis:
    image: redis:7-alpine
    networks:
      - live-net

networks:
  live-net:

volumes:
  mysql_data: